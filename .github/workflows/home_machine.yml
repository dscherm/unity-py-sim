name: Home Machine — Unity Deploy + PlayMode Tests (v2)

# Runs on the self-hosted Windows runner with Unity 6 + CoPlay installed.
# v1 scope: regenerate each game's CoPlay scene setup in batchmode and
# capture the Unity log; fail the check on compile errors / setup exceptions.
# v2 (M-7 phase 2) adds Unity Test Framework PlayMode tests after the deploy
# step — fails red on Awake/Start/Update NullRefs that batchmode setup misses.
# See CROSS_MACHINE.md for runner registration and license setup.

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      games:
        description: "Space-separated game names to deploy (default: all)"
        required: false
        default: ""

permissions:
  contents: read
  actions: write

jobs:
  # Build the deploy matrix dynamically so the `games` workflow_dispatch
  # input can drop matrix entries entirely (rather than running them and
  # painting the row red on a non-zero "neutral skip" exit). A previous
  # attempt used a job-level `if:` referencing `matrix.game`, but GitHub
  # Actions evaluates job-level `if:` BEFORE matrix expansion, so the
  # `matrix` context is unresolved there ("Unrecognized named-value:
  # 'matrix'"). Computing the matrix in a prep job is the canonical
  # GHA pattern for input-driven matrix filtering.
  setup:
    name: Resolve matrix
    runs-on: ubuntu-latest
    outputs:
      games: ${{ steps.compute.outputs.games }}
    steps:
      - name: Compute matrix
        id: compute
        shell: bash
        run: |
          set -euo pipefail
          # Single source of truth for "regenerable games" — when adding
          # a new generated project, append here AND below in the deploy
          # job's matrix fallback (kept for readability of the static
          # case in code review).
          ALL='["breakout","flappy_bird"]'
          INPUT='${{ inputs.games }}'
          EVENT='${{ github.event_name }}'
          if [[ "$EVENT" == "workflow_dispatch" && -n "${INPUT// /}" ]]; then
            # Filter the requested list against known games (rejects
            # typos so a user dispatching `games=brakout` doesn't get a
            # silent no-op). Whitespace-tolerant, dedup'd, case-sensitive.
            games=$(echo "$INPUT" \
              | tr ' ' '\n' \
              | sort -u \
              | awk '/^(breakout|flappy_bird)$/' \
              | jq -R -s -c 'split("\n") | map(select(length > 0))')
            if [[ -z "$games" || "$games" == "[]" ]]; then
              echo "::warning::No valid games in inputs.games='$INPUT'; falling back to full matrix"
              games="$ALL"
            fi
          else
            games="$ALL"
          fi
          echo "games=$games" >> "$GITHUB_OUTPUT"
          echo "Selected matrix: $games"

  deploy:
    needs: setup
    name: ${{ matrix.game }}
    runs-on: [self-hosted, Windows, unity]
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        game: ${{ fromJSON(needs.setup.outputs.games) }}
    env:
      GAME: ${{ matrix.game }}
      PROJECT_PATH: data/generated/${{ matrix.game }}_project
      # Deterministic log path so the deploy step writes here and the
      # upload step finds it without juggling step outputs.
      DEPLOY_LOG: deploy_logs/${{ matrix.game }}.log
      TESTS_RESULTS: deploy_logs/${{ matrix.game }}_tests.xml
      TESTS_LOG: deploy_logs/${{ matrix.game }}_tests.log
    # Use built-in Windows PowerShell 5.1 (`shell: powershell`) — pwsh
    # (PowerShell 7) isn't installed on the runner. The deploy script
    # is written to be PS5.1-compatible.
    defaults:
      run:
        shell: powershell
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pre-deploy cleanup (kill orphan Unity processes)
        # When a prior matrix entry or workflow run is cancelled, Unity
        # processes are not always terminated cleanly.  The leftover
        # `Unity.exe` and especially `UnityShaderCompiler.exe` keep RAM
        # pinned and starve the next cold-start, which is the failure
        # mode that produced `Crash_2026-04-26_153847992` (master run
        # 24960280211): the prior cancelled run at 14:23 left enough
        # memory pressure that the 15:31 deploy OOM'd during URP
        # path-tracing shader compile (`LightmapDirectIntegration.urtshader`,
        # `0x8007000e`).  Best-effort kill — exits 0 if nothing to clean.
        run: |
          $names = @('Unity', 'UnityShaderCompiler', 'UnityHelper', 'UnityHub.CrashHandler64')
          foreach ($n in $names) {
            $procs = Get-Process -Name $n -ErrorAction SilentlyContinue
            if ($procs) {
              Write-Host ("Killing $($procs.Count) leftover $n process(es)")
              $procs | Stop-Process -Force -ErrorAction SilentlyContinue
            }
          }
          # Wait briefly so handles release before Unity launches.
          Start-Sleep -Seconds 2

      - name: Verify project exists
        run: |
          if (-not (Test-Path "${env:PROJECT_PATH}")) {
            Write-Error "Project path ${env:PROJECT_PATH} not present in checkout"
            exit 1
          }
          if (-not (Test-Path "${env:PROJECT_PATH}/Assets/Editor/GeneratedSceneSetup.cs")) {
            Write-Error "GeneratedSceneSetup.cs missing -- regenerate the project first"
            exit 1
          }

      - name: Prepare deploy log directory
        run: |
          New-Item -ItemType Directory -Force -Path "deploy_logs" | Out-Null

      - name: Deploy CoPlay scene (batchmode)
        run: |
          & tools/home_machine_deploy.ps1 `
            -ProjectPath "${env:PROJECT_PATH}" `
            -Method "GeneratedSceneSetup.Execute" `
            -LogFile "${env:DEPLOY_LOG}"

      - name: Run PlayMode tests
        run: |
          & tools/home_machine_run_tests.ps1 `
            -ProjectPath "${env:PROJECT_PATH}" `
            -ResultsFile "${env:TESTS_RESULTS}" `
            -LogFile "${env:TESTS_LOG}"

      - name: Upload PlayMode test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.game }}-tests-${{ github.run_id }}
          path: |
            ${{ env.TESTS_RESULTS }}
            ${{ env.TESTS_LOG }}
          if-no-files-found: warn
          retention-days: 14

      - name: Record run metadata
        if: always()
        run: |
          $resultsDir = "data/metrics/home_machine_runs"
          New-Item -ItemType Directory -Force -Path $resultsDir | Out-Null
          $ts = (Get-Date).ToUniversalTime().ToString("yyyyMMddTHHmmssZ")
          $dst = Join-Path $resultsDir "${env:GAME}_${ts}.json"
          $status = if ("${{ job.status }}" -eq "success") { "deployed_and_tested" } else { "failed" }
          $payload = @{
            game = "${env:GAME}"
            status = $status
            phase = "deploy+playtest_v2"
            commit = "${env:GITHUB_SHA}"
            run_id = "${env:GITHUB_RUN_ID}"
            timestamp_utc = (Get-Date).ToUniversalTime().ToString("o")
          } | ConvertTo-Json
          Set-Content -Path $dst -Value $payload -Encoding utf8
          Write-Host "Wrote $dst"

      - name: Upload Unity log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.game }}-deploy-${{ github.run_id }}
          path: ${{ env.DEPLOY_LOG }}
          if-no-files-found: warn
          retention-days: 14
