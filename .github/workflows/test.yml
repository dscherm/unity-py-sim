name: tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    env:
      SDL_VIDEODRIVER: dummy
      PYGAME_HIDE_SUPPORT_PROMPT: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest tests/ --tb=short -q

  ruff:
    name: ruff lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install ruff
        run: python -m pip install ruff

      - name: Lint
        run: ruff check src/ tests/ tools/

  gates:
    name: gate pipeline (structural + convention + compilation)
    runs-on: ubuntu-latest
    env:
      SDL_VIDEODRIVER: dummy
      PYGAME_HIDE_SUPPORT_PROMPT: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run gate pipeline (quick mode)
        run: python -m tools.gate_pipeline --quick
        continue-on-error: true

  gap_gate:
    name: gap gate (parity coverage on touched files)
    runs-on: ubuntu-latest
    env:
      SDL_VIDEODRIVER: dummy
      PYGAME_HIDE_SUPPORT_PROMPT: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gap_gate needs full history for `git diff <base>`

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Determine base ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=HEAD~1" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Gap Gate (no-scaffold; report only)
        run: python -m src.gates.gap_gate --base ${{ steps.base.outputs.ref }} --no-scaffold

  snapshot:
    name: metrics snapshot + dashboard
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write  # ASP-6: auto-commits dashboard + history back to master
    env:
      SDL_VIDEODRIVER: dummy
      PYGAME_HIDE_SUPPORT_PROMPT: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for the auto-commit push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Refresh parity matrix
        run: python -m src.gates.parity_matrix
        continue-on-error: true

      - name: Refresh roundtrip baseline
        run: python tools/run_roundtrip_baseline.py
        continue-on-error: true

      - name: Take snapshot
        run: python -m src.gates.snapshot --notes "ci push ${{ github.sha }}"

      - name: Render dashboard
        run: python tools/render_dashboard.py

      - name: Upload snapshot + dashboard
        uses: actions/upload-artifact@v4
        with:
          name: metrics-${{ github.sha }}
          path: |
            data/metrics/history/
            data/metrics/dashboard.md
          retention-days: 90

      - name: Auto-commit history + dashboard back to master
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        continue-on-error: true  # fail-soft: a push race must not redden the suite
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/metrics/history/ data/metrics/dashboard.md
          if git diff --cached --quiet; then
            echo "[snapshot] no metric changes since last push — skipping commit"
            exit 0
          fi
          git commit -m "chore(metrics): auto-commit dashboard + snapshot for ${{ github.sha }}

          Auto-generated by .github/workflows/test.yml :: snapshot job per ASP-6.
          Sources: src/gates/snapshot.py + tools/render_dashboard.py.

          [skip ci]"
          # Rebase first in case another push landed since checkout; then push.
          git pull --rebase --autostash origin "${{ github.ref_name }}" || true
          git push origin "HEAD:${{ github.ref_name }}"
