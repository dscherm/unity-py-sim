name: tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    env:
      SDL_VIDEODRIVER: dummy
      PYGAME_HIDE_SUPPORT_PROMPT: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest tests/ --tb=short -q

  ruff:
    name: ruff lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install ruff
        run: python -m pip install ruff

      - name: Lint
        run: ruff check src/ tests/ tools/

  gates:
    name: gate pipeline (structural + convention + compilation)
    runs-on: ubuntu-latest
    env:
      SDL_VIDEODRIVER: dummy
      PYGAME_HIDE_SUPPORT_PROMPT: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run gate pipeline (quick mode)
        run: python -m tools.gate_pipeline --quick
        continue-on-error: true

  snapshot:
    name: metrics snapshot + dashboard
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Take snapshot
        run: python -m src.gates.snapshot --notes "ci push ${{ github.sha }}"

      - name: Render dashboard
        run: python tools/render_dashboard.py

      - name: Upload snapshot + dashboard
        uses: actions/upload-artifact@v4
        with:
          name: metrics-${{ github.sha }}
          path: |
            data/metrics/history/
            data/metrics/dashboard.md
          retention-days: 90
